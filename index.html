<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Battle Arena</title>
    <style>
        :root { --primary: #ff4a00; --dark: #0f111a; --card-bg: #1a1d29; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 0; }
        header { background: var(--card-bg); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .logo { font-size: 20px; font-weight: bold; color: var(--primary); }
        .nav-btn { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .match-card { background: var(--card-bg); border-radius: 8px; margin-bottom: 15px; border: 1px solid #2a2f42; overflow: hidden; }
        .match-header { background: #24293c; padding: 12px; font-weight: bold; display: flex; justify-content: space-between; font-size: 14px; }
        .match-body { padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; font-size: 13px; }
        .btn-join { background: var(--primary); color: white; border: none; width: 100%; padding: 10px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        /* Admin Modal Styling */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; border: 1px solid var(--primary); }
        .modal input { width: 100%; padding: 10px; margin-bottom: 10px; background: #24293c; border: 1px solid #3d4563; color: white; border-radius: 4px; box-sizing: border-box; }
        .close-btn { background: #555; color: white; border: none; padding: 8px; width: 100%; margin-top: 5px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">🔥 FF ARENA</div>
        <button class="nav-btn" onclick="openAdmin()">Admin Panel</button>
    </header>

    <div class="container">
        <h3 style="border-left: 3px solid var(--primary); padding-left: 8px;">Upcoming Tournaments</h3>
        <div id="match-container">
            <!-- Matches yahan JavaScript se load honge -->
        </div>
    </div>

    <!-- Admin Modal -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--primary); margin-top:0;">Create New Match</h3>
            <input type="text" id="mTitle" placeholder="Match Title (e.g., Squad Bermuda)">
            <input type="text" id="mPrize" placeholder="Total Prize Pool (e.g., ₹2000)">
            <input type="text" id="mKill" placeholder="Per Kill Prize (e.g., ₹10)">
            <input type="text" id="mFee" placeholder="Entry Fee (e.g., ₹20 या FREE)">
            <input type="text" id="mTime" placeholder="Match Time (e.g., 08:00 PM)">
            <button class="btn-join" onclick="addNewMatch()">Publish Match</button>
            <button class="close-btn" onclick="closeAdmin()">Cancel</button>
            <button class="close-btn" onclick="clearAllMatches()" style="background:#d9534f; margin-top:15px;">Delete All Matches</button>
        </div>
    </div>

    <script>
        // Default matches agar database khali ho
        const defaultMatches = [
            { id: 1, title: "Solo Bermuda Blitz", prize: "₹1000", kill: "₹5", fee: "FREE", time: "06:00 PM" },
            { id: 2, title: "Squad Kalahari Showdown", prize: "₹5000", kill: "₹20", fee: "₹50", time: "09:30 PM" }
        ];

        // Phone ke LocalStorage se matches fetch karna (Phone Database)
        function getMatches() {
            const matches = localStorage.getItem('ff_matches');
            return matches ? JSON.parse(matches) : defaultMatches;
        }

        // Website par matches display karne ka logic
        function renderMatches() {
            const container = document.getElementById('match-container');
            const matches = getMatches();
            container.innerHTML = '';

            if(matches.length === 0) {
                container.innerHTML = '<p style="color:#aaa; text-align:center;">No matches available right now.</p>';
                return;
            }

            matches.forEach(match => {
                container.innerHTML += `
                    <div class="match-card">
                        <div class="match-header">
                            <span>${match.title}</span>
                            <span style="color: var(--primary);">${match.time}</span>
                        </div>
                        <div class="match-body">
                            <div class="grid">
                                <div><b>Prize Pool:</b> ${match.prize}</div>
                                <div><b>Per Kill:</b> ${match.kill}</div>
                                <div><b>Entry Fee:</b> ${match.fee}</div>
                                <div><b>Status:</b> Registration Open</div>
                            </div>
                            <button class="btn-join" onclick="registerPlayer(${match.id})">JOIN TOURNAMENT</button>
                        </div>
                    </div>
                `;
            });
        }

        // Player registration action (Aap isme apna Google Form ya WhatsApp link dynamic kar sakte hain)
        function registerPlayer(id) {
            let uid = prompt("Apni Free Fire UID dalein:");
            let ign = prompt("Apna In-Game Name (IGN) dalein:");
            
            if (uid && ign) {
                alert(`Success! Aap Match #${id} ke liye register ho gaye hain.\nUID: ${uid}\nIGN: ${ign}\n\nAbhi hamare WhatsApp/Discord group ko join karein Room ID & Pass ke liye!`);
                // Yahan aap window.location.href = "YOUR_WHATSAPP_LINK" daal sakte hain.
            } else {
                alert("Registration cancel kar diya gaya. Sahi details bharein!");
            }
        }

        // Admin Actions
        function openAdmin() { document.getElementById('adminModal').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }

        function addNewMatch() {
            const title = document.getElementById('mTitle').value;
            const prize = document.getElementById('mPrize').value;
            const kill = document.getElementById('mKill').value;
            const fee = document.getElementById('mFee').value;
            const time = document.getElementById('mTime').value;

            if(!title || !prize || !kill || !fee || !time) {
                alert("Saare fields bharna zaroori hai bhai!");
                return;
            }

            const matches = getMatches();
            const newMatch = { id: Date.now(), title, prize, kill, fee, time };
            matches.push(newMatch);
            
            localStorage.setItem('ff_matches', JSON.stringify(matches));
            renderMatches();
            closeAdmin();
            
            // Clear inputs
            document.getElementById('mTitle').value = '';
            document.getElementById('mPrize').value = '';
            document.getElementById('mKill').value = '';
            document.getElementById('mFee').value = '';
            document.getElementById('mTime').value = '';
        }

        function clearAllMatches() {
            if(confirm("Kya aap sach me saare matches delete karna chahte hain?")) {
                localStorage.setItem('ff_matches', JSON.stringify([]));
                renderMatches();
                closeAdmin();
            }
        }

        // Initial Load
        renderMatches();
    </script>
</body>
</html>
