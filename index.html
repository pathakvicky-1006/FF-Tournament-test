<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperCode Studio</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #1e1e1e; color: #d4d4d4; }
 .cour-blue { background: #0056D2; }
</style>
</head>
<body>

<div class="h-screen flex flex-col">
  <!-- Top Bar -->
  <div class="p-2 bg-gray-800 flex gap-2 items-center">
    <select id="lang" class="bg-gray-700 p-2 rounded text-sm">
      <option value="python">Python</option>
      <option value="javascript">JavaScript</option>
      <option value="java">Java</option>
      <option value="cpp">C++</option>
      <option value="csharp">C#</option>
      <option value="kotlin">Kotlin</option>
      <option value="r">R</option>
      <option value="sql">SQL</option>
      <option value="html">HTML</option>
    </select>
    <button onclick="runCode()" class="cour-blue px-4 py-2 rounded text-white font-bold">Run ▶</button>
  </div>

  <!-- Editor + Output -->
  <textarea id="editor" class="flex-1 bg-black p-2 font-mono text-sm outline-none" spellcheck="false">// Write code here
print("Hello SuperCode")</textarea>

  <div class="h-1/3 bg-black border-t border-gray-700 p-2 flex flex-col">
    <b>Output / Gemini AI</b>
    <pre id="output" class="flex-1 overflow-auto text-green-400"></pre>
    <div class="flex gap-2">
      <input id="aiPrompt" placeholder="Ask Gemini: explain this code" class="flex-1 bg-gray-800 p-2 rounded text-sm"/>
      <button onclick="askAI()" class="cour-blue px-3 py-2 rounded text-white text-sm">Ask AI</button>
    </div>
  </div>
</div>

<script>
const API_URL = "https://emkc.org/api/v2/piston/execute"; // Free code runner
const GEMINI_KEY = "PASTE_YOUR_GEMINI_API_KEY_HERE"; // <-- Yaha apni key daal de

async function runCode() {
  const code = document.getElementById('editor').value;
  const lang = document.getElementById('lang').value;
  document.getElementById('output').innerText = "Running...";

  const res = await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      language: lang,
      version: "*",
      files: [{ content: code }]
    })
  });
  const data = await res.json();
  document.getElementById('output').innerText = data.run.output || data.message;
}

async function askAI() {
  const code = document.getElementById('editor').value;
  const prompt = document.getElementById('aiPrompt').value;
  document.getElementById('output').innerText = "Gemini is thinking...";

  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      contents: [{ parts: [{ text: `You are a coding tutor. Language: ${document.getElementById('lang').value}. Code: ${code}. Question: ${prompt}` }] }]
    })
  });
  const data = await res.json();
  document.getElementById('output').innerText = data.candidates[0].content.parts[0].text;
}
</script>

</body>
</html>
